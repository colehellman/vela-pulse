name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vela
          POSTGRES_PASSWORD: vela
          POSTGRES_DB: vela_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://vela:vela@localhost:5432/vela_test?sslmode=disable
      TEST_REDIS_URL: redis://localhost:6379/1

    defaults:
      run:
        working-directory: gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Install pg_partman
        run: |
          docker exec $(docker ps -q --filter ancestor=postgres:16) \
            bash -c "apt-get update -qq && apt-get install -y postgresql-16-partman"

      - name: Apply migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          goose -dir ../infra/migrations postgres "$TEST_DATABASE_URL" up

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: gateway
          version: latest

      - name: Test (with race detector)
        run: go test ./... -race -count=1 -timeout=120s

  scraper:
    name: Scraper (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scraper

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check scraper/ tests/

      - name: Test
        run: uv run pytest tests/ -v --tb=short
